<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>JS Objects Lab</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section>
      <h2>Activity 1: Heartbeat Tracker</h2>
      <div
        id="heartbeatStage"
        style="
          width: 500px;
          height: 300px;
          border: 2px solid #333;
          position: relative;
          overflow: hidden;
          background: #f9f9f9;
        "
      >
        <img
          id="heart"
          src="https://codd.cs.gsu.edu/~lhenry23/Web/inc/inc12/heart.png"
          style="position: absolute; width: 50px; left: 22px; top: 22px"
          alt="heart"
        />
      </div>
      <p>
        Speed: <input type="range" id="speedRange" min="1" max="20" value="5" />
      </p>
      <button id="resetHeartBtn">Reset Heart</button>
    </section>

    <hr />

    <section>
      <h2>Activity 2: Tic-Tac-Toe</h2>
      <h3 id="turnInfo">Your turn</h3>
      <div id="gameBoard">
        <button></button><button></button><button></button> <button></button
        ><button></button><button></button> <button></button><button></button
        ><button></button>
      </div>
      <br />
      <button id="newGameButton">New Game</button>
    </section>

    <script src="heartbeattracker.js"></script>
    <script src="tictactoe.js"></script>
  </body>
</html>
